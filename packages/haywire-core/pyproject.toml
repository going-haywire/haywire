[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "haywire-core"
version = "0.0.5"
description = "Haywire Node System Framework"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Haywire Team"}
]
keywords = ["haywire", "node-editor", "visual-programming", "framework"]

dependencies = [
    "nicegui>=3.12.1",
    "watchdog>=6.0.0",
    "injector>=0.22.0",
    "attrs==25.4.0",
    "cattrs==25.3.0",
    "toml>=0.10.2",
    "packaging",
    "typing_extensions",
]

[tool.hatch.build.targets.wheel]
packages = ["src/haywire"]

[tool.hatch.build.targets.sdist]
include = [
    "src/haywire/",
]
