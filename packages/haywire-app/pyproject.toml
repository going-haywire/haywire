[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "haywire-app"
version = "0.1.0"
description = "Haywire Node Editor Application"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Haywire Team"}
]
keywords = ["haywire", "node-editor", "visual-programming", "application"]

dependencies = [
    "haywire-framework>=0.1.0",
    "haybale-core>=1.0.0",
]

[project.scripts]
haywire = "haywire_app:main"

[tool.uv.sources]
haywire-framework = { workspace = true }
haybale-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/haywire_app"]

[tool.hatch.build.targets.sdist]
include = [
    "src/haywire_app/",
]
