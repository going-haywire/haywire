# haywire-light.toml
# User-editable partial overrides for the Haywire Light workbench theme.
# Copy any token you want to customise; tokens not listed here keep the
# built-in default values from HaywireLightTheme in builtin.py.
#
# All values are CSS colour strings (hex, rgba, named colour, etc.).

# ── Backgrounds ──────────────────────────────────────────────────────────────
bg_page     = '#f8f8fc'
bg_surface  = '#e8e8f0'
bg_sidebar  = '#f0f0f8'
bg_elevated = '#f0f0f6'
bg_overlay  = 'rgba(0,0,0,0.3)'
bg_input    = '#f8f8fc'

# ── Borders ───────────────────────────────────────────────────────────────────
border       = 'rgba(0,0,0,0.15)'
border_strong = '#a0a0c0'

# ── Text ──────────────────────────────────────────────────────────────────────
text_body      = 'rgba(0,0,0,0.87)'
text_muted     = 'rgba(0,0,0,0.55)'
text_dim       = 'rgba(0,0,0,0.6)'
text_expansion = 'rgba(0,0,0,0.8)'
text_on_accent = '#ffffff'

# ── Accent ────────────────────────────────────────────────────────────────────
accent        = '#4f8ef7'
accent_hover  = '#6090ff'
accent_active = '#3060d0'

# ── Status ────────────────────────────────────────────────────────────────────
danger  = '#d32f2f'
warning = '#f57c00'
success = '#388e3c'
info    = '#1976d2'

# ── Node ─────────────────────────────────────────────────────────────────────
node_bg          = 'rgba(255,255,255,0.3)'
node_border      = '#ffffff'
node_header_bg   = '#f0f0f6'
node_header_text = 'rgba(0,0,0,0.87)'
node_selected    = '#4f8ef7'
node_shadow      = 'rgba(0,0,0,0.08)'

# ── Edge ──────────────────────────────────────────────────────────────────────
edge_default  = '#a0a0c0'
edge_selected = '#4f8ef7'

# ── Canvas ────────────────────────────────────────────────────────────────────
canvas_bg   = '#1e1e1e'
canvas_grid = '#2d2d2d'

# ── TopBar ────────────────────────────────────────────────────────────────────
topbar_bg   = '#ffffff'
topbar_text = 'rgba(0,0,0,0.87)'

# ── Sidebar / ActivityBar ─────────────────────────────────────────────────────
sidebar_bg          = '#f0f0f8'
sidebar_icon        = '#8080b0'
sidebar_icon_active = '#4f8ef7'

# ── Panel ─────────────────────────────────────────────────────────────────────
panel_bg   = '#ffffff'
panel_text = 'rgba(0,0,0,0.87)'

# ── StatusBar ─────────────────────────────────────────────────────────────────
statusbar_bg   = '#1565c0'
statusbar_text = 'rgba(255,255,255,0.87)'

# ── Console ───────────────────────────────────────────────────────────────────
console_bg   = '#f0f0f0'
console_text = 'rgba(0,0,0,0.87)'
