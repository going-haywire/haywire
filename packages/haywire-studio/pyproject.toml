[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "haywire-studio"
version = "0.0.4"
description = "Haywire Node Editor Application"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Haywire Team"}
]
keywords = ["haywire", "node-editor", "visual-programming", "application"]

dependencies = [
    "haywire-core~=0.0.4",
    "nicegui",
    "toml>=0.10.2",
]

[project.scripts]
haywire = "haywire_studio:main"

[tool.uv.sources]
haywire-core = { workspace = true }
haybale-core = { workspace = true }
haybale-studio = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/haywire_studio"]

[tool.hatch.build.targets.sdist]
include = [
    "src/haywire_studio/",
]

[tool.mypy]
python_version = "3.10"

[[tool.mypy.overrides]]
module = ["toml", "haywire.*"]
ignore_missing_imports = true
