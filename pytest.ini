[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, full system)
    slow: Slow running tests
    ui: UI-related tests
    core: Core functionality tests

# Coverage settings
[coverage:run]
source = src/haywire,libraries
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */.*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
