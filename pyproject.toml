[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "haywire-framework"
version = "0.0.1"
description = "Haywire Node System"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "nicegui",
    "ffmpegio~=0.11.1",
    "numpy",
    "opencv-python",
    "watchdog>=6.0.0",
    "injector>=0.22.0",
    "attrs==25.4.0",
    "cattrs==25.3.0",
    "toml>=0.10.2",
    "rerun-sdk>=0.29.0",
    "duit[nicegui]",
]

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "mypy",
    "ruff",
    "nicegui",
    "ffmpegio~=0.11.1",
    "numpy",
    "opencv-python",
    "pyinstaller>=6.14.1",
    "watchdog>=6.0.0",
    "injector>=0.22.0",
    "attrs==25.4.0",
    "cattrs==25.3.0",
]

[tool.ruff]
# Set the maximum line length to 109.
line-length = 109

[tool.ruff.lint]
# Add the `line-too-long` rule to the enforced rule set. By default, Ruff omits rules that
# overlap with the use of a formatter, like Black, but we can override this behavior by
# explicitly adding the rule.
extend-select = ["E501"]