[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "haywire"
version = "0.0.1"
description = "Haywire Node System"
readme = "README.md"
requires-python = ">=3.10"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "mypy",
    "ruff",
    "nicegui",
    "ffmpegio~=0.11.1",
    "numpy",
    "opencv-python",
    "pyinstaller>=6.14.1"
]

[tool.setuptools.packages.find]
where = ["src"]
