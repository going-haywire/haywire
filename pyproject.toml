[project]
name = "haywire-workspace"
version = "0.0.1"
requires-python = ">=3.10"

[tool.uv.workspace]
members = [
    "packages/*",
    "barn/*",
]

[tool.uv.sources]
haywire-core = { workspace = true }
haywire-studio = { workspace = true }
haybale-core = { workspace = true }
haybale-studio = { workspace = true }
haybale-example = { workspace = true }
haybale-testing = { workspace = true }
haybale-visiongraph = { workspace = true }
haybale-TEST_A = { workspace = true }

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "mypy",
    "ruff",
    "pyinstaller>=6.14.1",
    "playwright",
    "pytest-playwright",
    "requests",
    "haywire-core",
    "haywire-studio",
    "haybale-core",
    "haybale-studio",
    "haybale-example",
    "haybale-testing",
    "haybale-visiongraph",
    "haybale-TEST_A",
    "mkdocs-material>=9.7.6",
]

[tool.mypy]
python_version = "3.10"
mypy_path = [
    "packages/haywire-core/src",
    "packages/haywire-studio/src",
    "barn/haybale-core",
    "barn/haybale-studio",
    "barn/haybale-testing",
    "barn/haybale-example",
    "barn/haybale-visiongraph",
    "barn/haybale-TEST_A",
]

[[tool.mypy.overrides]]
module = ["toml", "nicegui.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 109
exclude = ["playground/"]

[tool.ruff.lint]
extend-select = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (slower, full system)",
    "slow: Slow running tests",
    "ui: UI-related tests",
    "core: Core functionality tests",
]
addopts = "-v --strict-markers --tb=short --maxfail=5"
