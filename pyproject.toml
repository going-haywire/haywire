[project]
name = "OpenTrackingTool"
version = "0.0.1"
description = "Base installation for OpenTrackingTool"
readme = "README.md"
requires-python = "==3.12"
dependencies = [
    "duit[nicegui]>=0.1.17",
    "pygfx~=0.7.0",
    "visiongraph[azure,depthai,mediapipe,onnx-directml,openvino,realsense]~=1.0.2",
    "visiongraph-ui[vg]~=0.4.0a2",
    "python-osc>=1.9.3",
    "pywebview>=5.4",
    "ffmpegio~=0.11.1",
    "numpy",
    "opencv-python",
]

[dependency-groups]
dev = [
    "pyinstaller>=6.14.1",
]
