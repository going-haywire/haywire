[project]
name = "haywire-workspace"
version = "0.0.1"
requires-python = ">=3.10"

[tool.uv.workspace]
members = [
    "packages/*",
    "barn/*",
]

[tool.uv.sources]
haywire-framework = { workspace = true }
haywire-app = { workspace = true }
haybale-core = { workspace = true }
haybale-example = { workspace = true }
haybale-testing = { workspace = true }
haybale-visiongraph = { workspace = true }
haybale-TEST_A = { workspace = true }

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "mypy",
    "ruff",
    "pyinstaller>=6.14.1",
    "haywire-framework",
    "haywire-app",
    "haybale-core",
    "haybale-example",
    "haybale-testing",
    "haybale-visiongraph",
    "haybale-TEST_A",
]

[tool.ruff]
line-length = 109

[tool.ruff.lint]
extend-select = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (slower, full system)",
    "slow: Slow running tests",
    "ui: UI-related tests",
    "core: Core functionality tests",
]
addopts = "-v --strict-markers --tb=short --maxfail=5"
